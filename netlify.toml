# Configuration Netlify pour SPA Vite (React Router côté client).
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Toutes les URLs renvoient vers index.html — React Router gère le routing côté client.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
